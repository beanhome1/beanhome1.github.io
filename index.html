<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bottom Line Energy — Market Data</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --win-bg:     #008080;
        --win-gray:   #c0c0c0;
        --win-dark:   #808080;
        --win-darker: #404040;
        --win-white:  #ffffff;
        --win-black:  #000000;
        --win-title:  #000080;
        --win-title2: #1084d0;
      }

      html, body {
        background: var(--win-bg);
        font-family: 'VT323', 'Courier New', monospace;
        min-height: 100vh;
        overflow-x: hidden;
        background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 4px 4px;
      }

      /* ── Desktop area ── */
      .desktop {
        min-height: calc(100vh - 36px);
        padding: 16px;
        position: relative;
      }

      /* ── Desktop icons ── */
      .desktop-icons {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        padding: 8px;
      }

      .desktop-icon {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        width: 80px;
        text-decoration: none;
        cursor: pointer;
        padding: 4px;
        user-select: none;
        border: 1px solid transparent;
      }

      .desktop-icon:hover {
        border: 1px dotted var(--win-white);
        background: rgba(0, 0, 128, 0.3);
      }

      .desktop-icon.selected {
        border: 1px dotted var(--win-white);
        background: rgba(0, 0, 128, 0.5);
        outline: none;
      }

      .icon-img {
        width: 48px;
        height: 48px;
        image-rendering: pixelated;
        flex-shrink: 0;
      }

      .icon-label {
        font-family: 'VT323', monospace;
        font-size: 15px;
        color: var(--win-white);
        text-align: center;
        line-height: 1.2;
        text-shadow:
          1px 1px 0 var(--win-black),
          -1px 1px 0 var(--win-black),
          1px -1px 0 var(--win-black),
          -1px -1px 0 var(--win-black);
        max-width: 78px;
        word-break: break-word;
      }

      .desktop-icon.selected .icon-label {
        background: var(--win-title);
        color: var(--win-white);
        text-shadow: none;
        padding: 0 2px;
      }

      /* ── Taskbar ── */
      .taskbar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 36px;
        background: var(--win-gray);
        border-top: 2px solid var(--win-white);
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 0 4px;
        z-index: 100;
      }

      .start-btn {
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: 'VT323', monospace;
        font-size: 19px;
        font-weight: bold;
        color: var(--win-black);
        background: var(--win-gray);
        border-top:    2px solid var(--win-white);
        border-left:   2px solid var(--win-white);
        border-right:  2px solid var(--win-darker);
        border-bottom: 2px solid var(--win-darker);
        padding: 2px 10px 2px 6px;
        cursor: pointer;
        height: 28px;
        user-select: none;
      }

      .start-btn:active {
        border-top:    2px solid var(--win-darker);
        border-left:   2px solid var(--win-darker);
        border-right:  2px solid var(--win-white);
        border-bottom: 2px solid var(--win-white);
      }

      .start-logo {
        width: 18px;
        height: 18px;
        image-rendering: pixelated;
        flex-shrink: 0;
      }

      .taskbar-divider {
        width: 2px;
        height: 24px;
        border-left: 1px solid var(--win-darker);
        border-right: 1px solid var(--win-white);
        margin: 0 2px;
        flex-shrink: 0;
      }

      .taskbar-tray {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
        border-top:    1px solid var(--win-darker);
        border-left:   1px solid var(--win-darker);
        border-right:  1px solid var(--win-white);
        border-bottom: 1px solid var(--win-white);
        padding: 2px 8px;
        height: 24px;
        flex-shrink: 0;
      }

      .taskbar-clock {
        font-family: 'VT323', monospace;
        font-size: 17px;
        color: var(--win-black);
      }

      .taskbar-program {
        display: flex;
        align-items: center;
        gap: 5px;
        font-family: 'VT323', monospace;
        font-size: 16px;
        color: var(--win-black);
        background: var(--win-gray);
        border-top:    2px solid var(--win-darker);
        border-left:   2px solid var(--win-darker);
        border-right:  2px solid var(--win-white);
        border-bottom: 2px solid var(--win-white);
        padding: 2px 10px;
        height: 26px;
        text-decoration: none;
        min-width: 140px;
        flex-shrink: 0;
      }

      /* ── Start Menu ── */
      .start-menu {
        position: fixed;
        bottom: 36px;
        left: 0;
        width: 210px;
        background: var(--win-gray);
        border-top:    2px solid var(--win-white);
        border-left:   2px solid var(--win-white);
        border-right:  2px solid var(--win-darker);
        border-bottom: 2px solid var(--win-darker);
        display: none;
        z-index: 200;
        flex-direction: row;
      }

      .start-menu.open { display: flex; }

      .start-menu-sidebar {
        width: 22px;
        background: linear-gradient(180deg, var(--win-title2) 0%, var(--win-title) 100%);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 6px;
        flex-shrink: 0;
      }

      .start-menu-sidebar-text {
        writing-mode: vertical-rl;
        transform: rotate(180deg);
        font-family: 'VT323', monospace;
        font-size: 16px;
        color: var(--win-white);
        letter-spacing: 0.05em;
        white-space: nowrap;
      }

      .start-menu-sidebar-text strong { font-weight: bold; }

      .start-menu-items {
        flex: 1;
        padding: 4px 0;
      }

      .start-menu-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 5px 14px;
        font-family: 'VT323', monospace;
        font-size: 18px;
        color: var(--win-black);
        text-decoration: none;
        cursor: pointer;
        white-space: nowrap;
      }

      .start-menu-item:hover {
        background: var(--win-title);
        color: var(--win-white);
      }

      .start-menu-sep {
        height: 1px;
        background: var(--win-darker);
        box-shadow: 0 1px 0 var(--win-white);
        margin: 3px 6px;
      }
    </style>
  </head>
  <body>

    <div class="desktop" id="desktop">
      <div class="desktop-icons">

        <a class="desktop-icon" href="Oil_Prices.html" id="icon-oil">
          <div class="icon-img">
            <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges" width="48" height="48">
              <!-- Document -->
              <rect x="4" y="2" width="30" height="38" fill="#ffffff" stroke="#000000" stroke-width="1"/>
              <!-- Folded corner -->
              <polygon points="26,2 34,10 26,10" fill="#c0c0c0" stroke="#000000" stroke-width="1"/>
              <!-- Axes -->
              <rect x="8" y="14" width="1" height="20" fill="#000000"/>
              <rect x="8" y="33" width="20" height="1" fill="#000000"/>
              <!-- Bars -->
              <rect x="10" y="25" width="4" height="9" fill="#000080"/>
              <rect x="16" y="20" width="4" height="14" fill="#008000"/>
              <rect x="22" y="17" width="4" height="17" fill="#800000"/>
              <!-- Line -->
              <polyline points="12,23 18,18 24,15" fill="none" stroke="#ff0000" stroke-width="2"/>
              <!-- Title bar stub -->
              <rect x="4" y="2" width="30" height="6" fill="#000080"/>
              <rect x="6" y="4" width="14" height="2" fill="#ffffff"/>
              <!-- Oil drop (right side) -->
              <ellipse cx="38" cy="34" rx="6" ry="7" fill="#ffff00" stroke="#000000" stroke-width="1"/>
              <polygon points="38,22 34,31 42,31" fill="#ffff00" stroke="#000000" stroke-width="1"/>
              <!-- Shine on drop -->
              <rect x="35" y="30" width="2" height="4" fill="#ffffff" opacity="0.6"/>
            </svg>
          </div>
          <span class="icon-label">Oil Prices</span>
        </a>

      </div>
    </div>

    <!-- Start menu -->
    <div class="start-menu" id="startMenu">
      <div class="start-menu-sidebar">
        <span class="start-menu-sidebar-text"><strong>Windows</strong> 95</span>
      </div>
      <div class="start-menu-items">
        <a class="start-menu-item" href="Oil_Prices.html">📊 Oil Prices</a>
        <div class="start-menu-sep"></div>
        <span class="start-menu-item">⚙️ Settings</span>
        <div class="start-menu-sep"></div>
        <span class="start-menu-item">🔌 Shut Down...</span>
      </div>
    </div>

    <!-- Taskbar -->
    <div class="taskbar">
      <button class="start-btn" id="startBtn" onclick="toggleStart()">
        <svg class="start-logo" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
          <rect x="0" y="0" width="8" height="8" fill="#ff0000"/>
          <rect x="10" y="0" width="8" height="8" fill="#00ff00"/>
          <rect x="0" y="10" width="8" height="8" fill="#0000ff"/>
          <rect x="10" y="10" width="8" height="8" fill="#ffff00"/>
        </svg>
        Start
      </button>

      <div class="taskbar-divider"></div>

      <a class="taskbar-program" href="Oil_Prices.html">
        📊 Oil Prices
      </a>

      <div class="taskbar-tray">
        <span class="taskbar-clock" id="clock">12:00 PM</span>
      </div>
    </div>

    <script>
      function updateClock() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        var ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        document.getElementById('clock').textContent =
          h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
      }
      updateClock();
      setInterval(updateClock, 10000);

      function toggleStart() {
        document.getElementById('startMenu').classList.toggle('open');
      }

      document.addEventListener('click', function(e) {
        var menu = document.getElementById('startMenu');
        var btn  = document.getElementById('startBtn');
        if (!menu.contains(e.target) && !btn.contains(e.target)) {
          menu.classList.remove('open');
        }
      });

      // Icon single-click = select, double-click = open
      document.querySelectorAll('.desktop-icon').forEach(function(icon) {
        var clicks = 0;
        icon.addEventListener('click', function(e) {
          e.preventDefault();
          clicks++;
          document.querySelectorAll('.desktop-icon').forEach(function(i) { i.classList.remove('selected'); });
          icon.classList.add('selected');
          if (clicks === 1) {
            setTimeout(function() {
              if (clicks === 1) { /* single click, just select */ }
              clicks = 0;
            }, 300);
          } else if (clicks >= 2) {
            clicks = 0;
            window.location.href = icon.getAttribute('href');
          }
        });
      });

      // Deselect on bare desktop click
      document.getElementById('desktop').addEventListener('click', function(e) {
        if (e.target === this || e.target.classList.contains('desktop-icons')) {
          document.querySelectorAll('.desktop-icon').forEach(function(i) { i.classList.remove('selected'); });
        }
      });
    </script>

  </body>
</html>
